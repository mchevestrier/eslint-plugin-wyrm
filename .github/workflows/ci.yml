name: 🚦 CI

on:
  push:
    branches:
      - master
    tags:
      - '!**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses:
          # zizmor: ignore[cache-poisoning] caching restricted to trusted refs
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ github.ref == 'refs/heads/master' && 'pnpm' || '' }}
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: ⛏️ build
        run: pnpm run build
        working-directory: ./packages/eslint-plugin-wyrm/

      - name: ❓ arethetypeswrong
        run: pnpm run attw
        working-directory: ./packages/eslint-plugin-wyrm/

      - name: 📖 publint
        run: pnpm run publint
        working-directory: ./packages/eslint-plugin-wyrm/

      - name: ✒️ eslint-doc-generator
        run: pnpm run -r --reporter-hide-prefix lint:docs

      - name: 📃 markdownlint
        run: pnpm run -r --reporter-hide-prefix lint:md

      - name: 💄 prettier
        run: |
          pnpm prettier --check --ignore-unknown './*'
          pnpm run -r --reporter-hide-prefix lint:format

      - name: 🟦 typescript
        run: pnpm run lint:types

      - name: ✂️ knip
        run: pnpm run knip

      - name: ⬢ eslint
        run: |
          pnpm run eslint "*.mjs" "*.ts" "*.json"
          pnpm run -r --reporter-hide-prefix lint:js

  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js ${{ matrix.node-version }}
        uses:
          # zizmor: ignore[cache-poisoning] caching restricted to trusted refs
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ github.ref == 'refs/heads/master' && 'pnpm' || '' }}
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: 🧪 vitest
        run: pnpm run -r --reporter-hide-prefix test

  dogfooding:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses:
          # zizmor: ignore[cache-poisoning] caching restricted to trusted refs
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ github.ref == 'refs/heads/master' && 'pnpm' || '' }}
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: ⛏️ build
        run: pnpm run build
        working-directory: ./packages/eslint-plugin-wyrm/

      - name: 🐶 dogfooding
        run: pnpm run dogfooding

  typos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Spell Check Repo
        uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1.45.0

  commitlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses:
          # zizmor: ignore[cache-poisoning] caching restricted to trusted refs
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ github.ref == 'refs/heads/master' && 'pnpm' || '' }}
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: pnpm commitlint --last --verbose

      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        run: echo "$PR_TITLE" | pnpm commitlint --verbose
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

  preview:
    runs-on: ubuntu-latest

    needs: [checks, tests]
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.username != 'github-actions[bot]' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses:
          # zizmor: ignore[cache-poisoning] caching restricted to trusted refs
          actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ github.ref == 'refs/heads/master' && 'pnpm' || '' }}
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: ⛏️ build
        run: pnpm run build
        working-directory: ./packages/eslint-plugin-wyrm/

      - name: 📦 pkg.pr.new
        run: pnpx pkg-pr-new@0.0.61 publish './packages/eslint-plugin-wyrm/' --no-template --compact --packageManager=pnpm

  zizmor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          annotations: true
          color: true
          version: v1.23.1

  actionlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.11@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f
        with:
          args: -color
